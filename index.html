<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>Time To Party · Magazzino</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#f5f5f7;--panel:#ffffff;--panel2:#fafafa;--text:#111214;--muted:#70737a;
  --line:#e7e7eb;--brand:#7c3aed;--brand2:#a855f7;--ok:#14804a;--warn:#b76e00;
  --bad:#c52929;--shadow:0 14px 40px rgba(18,18,25,.08);--radius:20px;
}
[data-theme="dark"]{
  --bg:#0d0e11;--panel:#17181d;--panel2:#1d1f25;--text:#f5f5f7;--muted:#a6a8af;
  --line:#2b2d34;--shadow:0 14px 40px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:inherit}
.hidden{display:none!important}
.app{min-height:100vh}
.topbar{
 position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
 padding:12px 16px;background:color-mix(in srgb,var(--panel) 88%,transparent);
 backdrop-filter:blur(18px);border-bottom:1px solid var(--line)
}
.logo{
 width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:900;
 background:linear-gradient(145deg,var(--brand),var(--brand2));box-shadow:0 8px 22px rgba(124,58,237,.28)
}
.brandblock{min-width:0;flex:1}
.brandblock b{display:block;line-height:1.1}
.brandblock small{display:block;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{
 border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:13px;
 width:42px;height:42px;display:grid;place-items:center
}
.layout{display:block}
.sidebar{display:none}
.main{padding:18px 14px 104px;max-width:1500px;margin:auto}
.view{display:none}
.view.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:.2;transform:translateY(4px)}to{opacity:1;transform:none}}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:2px 2px 18px}
.pagehead h1{font-size:28px;line-height:1.05;margin:0}
.pagehead p{margin:5px 0 0;color:var(--muted);font-size:14px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
 border:0;border-radius:13px;padding:11px 14px;font-weight:750;background:var(--brand);color:#fff;
 box-shadow:0 8px 18px rgba(124,58,237,.18)
}
.btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line);box-shadow:none}
.btn.danger{background:var(--bad)}
.btn.small{padding:8px 10px;border-radius:10px;font-size:13px}
.grid{display:grid;gap:12px}
.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{
 background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
 box-shadow:var(--shadow)
}
.metric{padding:16px;min-height:120px;display:flex;flex-direction:column;justify-content:space-between}
.metric .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}
.metric .value{font-size:27px;font-weight:900;letter-spacing:-.04em}
.metric .sub{font-size:12px;color:var(--muted)}
.section{margin-top:16px}
.sectiontitle{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px}
.sectiontitle h2{font-size:18px;margin:0}
.sectiontitle span{font-size:13px;color:var(--muted)}
.panel{padding:15px}
.list{display:grid;gap:9px}
.listitem{
 display:flex;align-items:center;gap:12px;padding:12px;border-radius:15px;
 background:var(--panel2);border:1px solid var(--line)
}
.listitem.clickable:hover{border-color:color-mix(in srgb,var(--brand) 45%,var(--line));transform:translateY(-1px)}
.listitem.clickable{cursor:pointer;transition:.15s ease}
.avatar{
 width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-weight:900;flex:0 0 auto;
 background:color-mix(in srgb,var(--brand) 12%,var(--panel));color:var(--brand)
}
.itembody{min-width:0;flex:1}
.itembody b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itembody small{display:block;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itemend{text-align:right;flex:0 0 auto}
.itemend b{display:block}
.itemend small{color:var(--muted)}
.badge{
 display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:850;
 background:var(--panel2);border:1px solid var(--line)
}
.badge.ok{background:color-mix(in srgb,var(--ok) 12%,var(--panel));color:var(--ok);border-color:color-mix(in srgb,var(--ok) 25%,var(--line))}
.badge.warn{background:color-mix(in srgb,var(--warn) 12%,var(--panel));color:var(--warn);border-color:color-mix(in srgb,var(--warn) 25%,var(--line))}
.badge.bad{background:color-mix(in srgb,var(--bad) 12%,var(--panel));color:var(--bad);border-color:color-mix(in srgb,var(--bad) 25%,var(--line))}
.toolbar{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:12px}
.field,.search{
 width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);
 border-radius:13px;padding:12px 13px;outline:none
}
.field:focus,.search:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.tablewrap{overflow:auto;border-radius:16px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;min-width:780px;background:var(--panel)}
th,td{text-align:left;padding:12px 13px;border-bottom:1px solid var(--line);font-size:13px}
th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
tr:last-child td{border-bottom:0}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:color-mix(in srgb,var(--brand) 5%,var(--panel))}
.stockline{display:flex;align-items:center;gap:9px}
.stockbar{height:7px;background:var(--line);border-radius:99px;overflow:hidden;min-width:86px;flex:1}
.stockbar i{display:block;height:100%;background:var(--brand);border-radius:99px}
.empty{padding:30px;text-align:center;color:var(--muted)}
.chartrow{display:grid;gap:10px}
.chartitem{display:grid;grid-template-columns:minmax(90px,1fr) 2fr auto;align-items:center;gap:10px;font-size:13px}
.charttrack{height:10px;border-radius:99px;background:var(--line);overflow:hidden}
.charttrack i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand),var(--brand2))}
.bottomnav{
 position:fixed;bottom:0;left:0;right:0;z-index:60;display:grid;grid-template-columns:repeat(5,1fr);
 padding:7px 6px calc(7px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--panel) 93%,transparent);
 backdrop-filter:blur(20px);border-top:1px solid var(--line)
}
.navbtn{
 border:0;background:transparent;color:var(--muted);padding:7px 2px;border-radius:12px;
 display:grid;place-items:center;gap:3px;font-size:10px;font-weight:750
}
.navbtn .ico{font-size:20px;line-height:1}
.navbtn.active{color:var(--brand);background:color-mix(in srgb,var(--brand) 9%,transparent)}
.moremenu{
 position:fixed;right:12px;bottom:84px;z-index:70;width:min(290px,calc(100vw - 24px));
 padding:9px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)
}
.moremenu button{width:100%;border:0;background:transparent;color:var(--text);padding:12px;text-align:left;border-radius:12px}
.moremenu button:hover{background:var(--panel2)}
.modalback{
 position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.52);display:flex;align-items:flex-end;
 padding:0;backdrop-filter:blur(4px)
}
.modal{
 width:100%;max-height:92vh;overflow:auto;background:var(--panel);border-radius:24px 24px 0 0;
 padding:18px 16px calc(20px + env(safe-area-inset-bottom));box-shadow:var(--shadow)
}
.modalhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.modalhead h2{margin:0;font-size:21px}
.closebtn{border:0;background:var(--panel2);color:var(--text);width:38px;height:38px;border-radius:12px;font-size:20px}
.formgrid{display:grid;gap:11px}
.formgrid label{display:grid;gap:6px;font-size:12px;color:var(--muted);font-weight:750}
.formgrid label span{color:var(--text)}
.formactions{display:flex;gap:9px;justify-content:flex-end;margin-top:15px}
.detailgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px}
.detailbox{padding:12px;border-radius:14px;background:var(--panel2);border:1px solid var(--line)}
.detailbox small{display:block;color:var(--muted);margin-bottom:5px}
.detailbox b{display:block}
.dropzone{
 padding:28px 18px;border:2px dashed color-mix(in srgb,var(--brand) 35%,var(--line));
 border-radius:20px;text-align:center;background:color-mix(in srgb,var(--brand) 4%,var(--panel))
}
.dropzone input{display:none}
.dropzone label{cursor:pointer;display:block}
.dropzone b{display:block;font-size:18px}
.dropzone span{display:block;color:var(--muted);margin-top:7px;font-size:13px}
.notice{
 padding:12px 13px;border-radius:14px;background:color-mix(in srgb,var(--brand) 8%,var(--panel));
 border:1px solid color-mix(in srgb,var(--brand) 20%,var(--line));font-size:13px;line-height:1.45
}
.notice.warn{background:color-mix(in srgb,var(--warn) 9%,var(--panel));border-color:color-mix(in srgb,var(--warn) 25%,var(--line))}
.toast{
 position:fixed;left:50%;bottom:92px;z-index:200;transform:translateX(-50%) translateY(20px);
 background:#111;color:white;border-radius:13px;padding:11px 14px;box-shadow:0 12px 30px rgba(0,0,0,.28);
 opacity:0;pointer-events:none;transition:.2s ease;max-width:calc(100vw - 28px);text-align:center;font-size:13px
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.kpisplit{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.doclinks{display:flex;gap:8px;flex-wrap:wrap}
.doclink{font-size:12px;padding:8px 10px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);text-decoration:none}
hr.sep{border:0;border-top:1px solid var(--line);margin:16px 0}
.bulkrows{display:grid;gap:9px;margin-top:10px}
.bulkrow{display:grid;grid-template-columns:minmax(0,1fr) 88px 42px;gap:8px;align-items:end;padding:10px;border:1px solid var(--line);border-radius:15px;background:var(--panel2)}
.bulkrow label{display:grid;gap:5px;font-size:11px;color:var(--muted);font-weight:750}
.bulkrow label span{color:var(--text)}
.bulkrow .remove{width:42px;height:42px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--bad);font-size:20px}
.invoice-lines-editor{display:grid;gap:10px;margin-top:12px}
.invoice-line-edit{display:grid;grid-template-columns:minmax(180px,2fr) 90px 82px 110px 72px 42px;gap:7px;align-items:end;padding:10px;border:1px solid var(--line);border-radius:15px;background:var(--panel2)}
.invoice-line-edit label{display:grid;gap:5px;font-size:11px;color:var(--muted);font-weight:750}
.invoice-line-edit label span{color:var(--text)}
.checkline{display:flex!important;align-items:center;gap:6px;padding-bottom:12px;color:var(--text)!important}
.checkline input{width:18px;height:18px}
.progressbar{height:9px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:9px}
.progressbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .2s ease}
.rawocr{width:100%;min-height:150px;resize:vertical;line-height:1.35;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px}
@media(max-width:699px){
 .invoice-line-edit{grid-template-columns:1fr 82px;gap:8px}
 .invoice-line-edit .descfield{grid-column:1/-1}
 .invoice-line-edit .remove-cell{grid-column:2;grid-row:4}
}
@media(min-width:700px){
 .main{padding:24px 24px 60px}
 .metrics{grid-template-columns:repeat(4,minmax(0,1fr))}
 .toolbar{grid-template-columns:2fr 1fr 1fr}
 .modalback{align-items:center;justify-content:center;padding:20px}
 .modal{max-width:780px;border-radius:24px;padding:22px;max-height:90vh}
 .formgrid.two{grid-template-columns:repeat(2,1fr)}
 .detailgrid{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1050px){
 .topbar{display:none}
 .layout{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
 .sidebar{
   display:flex;position:sticky;top:0;height:100vh;flex-direction:column;padding:22px 16px;
   background:var(--panel);border-right:1px solid var(--line)
 }
 .sidebrand{display:flex;align-items:center;gap:11px;margin:0 7px 26px}
 .sidebrand .logo{width:45px;height:45px}
 .sidebrand b{display:block}
 .sidebrand small{color:var(--muted)}
 .sidenav{display:grid;gap:5px}
 .sidenav button{
   border:0;background:transparent;color:var(--muted);padding:12px 13px;border-radius:13px;text-align:left;
   font-weight:760;display:flex;align-items:center;gap:10px
 }
 .sidenav button.active{background:color-mix(in srgb,var(--brand) 10%,var(--panel));color:var(--brand)}
 .sidefoot{margin-top:auto;display:grid;gap:8px}
 .sidefoot .notice{font-size:11px}
 .main{padding:34px 34px 60px;max-width:1600px}
 .bottomnav{display:none}
 .moremenu{display:none!important}
 .pagehead h1{font-size:34px}
 .metrics{grid-template-columns:repeat(4,1fr)}
 .metric{min-height:135px;padding:19px}
 .metric .value{font-size:32px}
}
</style>
</head>

</div>

const DB_NAME = 'ttp_magazzino_github_v1';
const DB_VERSION = 2;
const DB_STORE = 'state';
const FILE_STORE = 'files';
const STATE_KEY = 'main';
let APP = null;
let CURRENT_VIEW = 'dashboard';
let filters = {};

const NAV = [
  ['dashboard','⌂','Dashboard'],
  ['invoices','▤','Fatture'],
  ['products','◆','Listino'],
  ['events','★','Serate'],
  ['warehouse','▦','Magazzino'],
  ['movements','⇄','Movimenti'],

  ['settings','⚙','Impostazioni']
];

function clone(v){return JSON.parse(JSON.stringify(v))}
function esc(v=''){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function eur(v){return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(Number(v||0))}
function num(v,d=0){return new Intl.NumberFormat('it-IT',{maximumFractionDigits:d,minimumFractionDigits:d}).format(Number(v||0))}
function dateIt(v){
  if(!v)return '—';
  const [y,m,d]=String(v).slice(0,10).split('-');
  return y&&m&&d?`${d}/${m}/${y}`:v;
}
function today(){return new Date().toISOString().slice(0,10)}
function nextId(arr){return arr.length?Math.max(...arr.map(x=>Number(x.id)||0))+1:1}
function norm(s=''){
  return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase()
    .replace(/[^A-Z0-9]+/g,' ').replace(/\s+/g,' ').trim();
}
function parseDocs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch{return []}}
function byId(arr,id){return arr.find(x=>Number(x.id)===Number(id))}
function product(id){return byId(APP.products,id)}
function supplier(id){return byId(APP.suppliers,id)}
function area(id){return byId(APP.areas,id)}
function eventById(id){return byId(APP.events,id)}
function invoiceById(id){return byId(APP.invoices,id)}

function openDB(){
 return new Promise((resolve,reject)=>{
  const req=indexedDB.open(DB_NAME,DB_VERSION);
  req.onupgradeneeded=()=>{
   const db=req.result;
   if(!db.objectStoreNames.contains(DB_STORE))db.createObjectStore(DB_STORE);
   if(!db.objectStoreNames.contains(FILE_STORE))db.createObjectStore(FILE_STORE,{keyPath:'id'});
  };
  req.onsuccess=()=>resolve(req.result);
  req.onerror=()=>reject(req.error);
 });
}
async function saveDocumentBlob(file){
 const db=await openDB(),id=`doc_${Date.now()}_${Math.random().toString(36).slice(2,9)}`;
 return new Promise((resolve,reject)=>{
  const tx=db.transaction(FILE_STORE,'readwrite');
  tx.objectStore(FILE_STORE).put({id,name:file.name||'documento',type:file.type||'application/octet-stream',blob:file,created_at:new Date().toISOString()});
  tx.oncomplete=()=>resolve({storage:'indexeddb',id,name:file.name||'documento',mime:file.type||''});
  tx.onerror=()=>reject(tx.error);
 });
}
async function getDocumentBlob(id){
 const db=await openDB();
 return new Promise((resolve,reject)=>{const tx=db.transaction(FILE_STORE,'readonly'),req=tx.objectStore(FILE_STORE).get(id);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>reject(req.error)});
}
async function openStoredDocument(id){
 const rec=await getDocumentBlob(id);if(!rec){alert('Documento non trovato su questo dispositivo.');return}
 const url=URL.createObjectURL(rec.blob),w=window.open(url,'_blank');if(!w)location.href=url;setTimeout(()=>URL.revokeObjectURL(url),60000);
}
async function loadState(){
 const db=await openDB();
 return new Promise((resolve,reject)=>{
  const tx=db.transaction(DB_STORE,'readonly');
  const req=tx.objectStore(DB_STORE).get(STATE_KEY);
  req.onsuccess=()=>resolve(req.result||null);
  req.onerror=()=>reject(req.error);
 });
}
async function saveState(){
 const db=await openDB();
 APP.meta=APP.meta||{};
 APP.meta.updated_at=new Date().toISOString();
 return new Promise((resolve,reject)=>{
  const tx=db.transaction(DB_STORE,'readwrite');
  tx.objectStore(DB_STORE).put(APP,STATE_KEY);
  tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error);
 });
}
async function init(){
 APP=await loadState();
 if(!APP){APP=clone(SEED_STATE);APP.meta={created_at:new Date().toISOString(),version:1};await saveState()}
 buildNav();
 bindGlobal();
 renderAll();
 navigate(location.hash.replace('#/','')||'dashboard',false);
 window.addEventListener('hashchange',()=>navigate(location.hash.replace('#/','')||'dashboard',false));
}
function buildNav(){
 const side=document.getElementById('sideNav');
 side.innerHTML=NAV.map(([id,ico,label])=>`<button data-nav="${id}"><span>${ico}</span>${label}</button>`).join('');
 const bottom=document.getElementById('bottomNav');
 const main=NAV.slice(0,4);
 bottom.innerHTML=main.map(([id,ico,label])=>`<button class="navbtn" data-nav="${id}"><span class="ico">${ico}</span>${label}</button>`).join('')
  +`<button class="navbtn" id="moreBtn"><span class="ico">•••</span>Altro</button>`;
 const more=document.getElementById('moreMenu');
 more.innerHTML=NAV.slice(4).map(([id,ico,label])=>`<button data-nav="${id}">${ico}&nbsp;&nbsp;${label}</button>`).join('');
 document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{navigate(b.dataset.nav);more.classList.add('hidden')});
 document.getElementById('moreBtn').onclick=()=>more.classList.toggle('hidden');
}
function bindGlobal(){
 document.getElementById('themeBtn').onclick=toggleTheme;
 document.getElementById('sideTheme').onclick=toggleTheme;
 document.getElementById('modalBack').addEventListener('click',e=>{if(e.target.id==='modalBack')closeModal()});
 document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
 const saved=localStorage.getItem('ttp_theme');
 if(saved)document.documentElement.dataset.theme=saved;
}
function toggleTheme(){
 const next=document.documentElement.dataset.theme==='dark'?'light':'dark';
 document.documentElement.dataset.theme=next;localStorage.setItem('ttp_theme',next);
}
function navigate(view,push=true){
 if(!NAV.some(x=>x[0]===view))view='dashboard';
 CURRENT_VIEW=view;
 document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===`view-${view}`));
 document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===view));
 if(push&&location.hash!==`#/${view}`)location.hash=`#/${view}`;
 window.scrollTo({top:0,behavior:'instant'});
 renderView(view);
}
function renderAll(){NAV.forEach(([id])=>renderView(id))}
function renderView(id){
 const f={dashboard:renderDashboard,invoices:renderInvoices,products:renderProducts,events:renderEvents,warehouse:renderWarehouse,movements:renderMovements,import:renderImport,settings:renderSettings}[id];

}
function toast(msg){

}
function openModal(html,onReady){
 const back=document.getElementById('modalBack'),m=document.getElementById('modal');
 m.innerHTML=html;back.classList.remove('hidden');
 m.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
 if(onReady)onReady(m);
}
function closeModal(){document.getElementById('modalBack').classList.add('hidden');document.getElementById('modal').innerHTML=''}

function stockMap(){
 const m={};APP.products.forEach(p=>m[p.id]=0);
 APP.movements.forEach(x=>m[x.product_id]=(m[x.product_id]||0)+Number(x.quantity_delta||0));
 return m;
}
function purchaseStats(pid){
 const lines=APP.invoice_lines.filter(l=>Number(l.product_id)===Number(pid)&&Number(l.affects_stock)===1&&!Number(l.is_free)&&Number(l.quantity_base)>0&&Number(l.gross_total)>=0);
 if(!lines.length)return {last:0,avg:0,min:0,max:0,lastDate:null};
 const enriched=lines.map(l=>({...l,inv:invoiceById(l.invoice_id)})).sort((a,b)=>String(a.inv?.invoice_date||'').localeCompare(String(b.inv?.invoice_date||''))||a.id-b.id);
 const totalQty=enriched.reduce((s,l)=>s+Number(l.quantity_base||0),0);
 const totalVal=enriched.reduce((s,l)=>s+Number(l.gross_total||0),0);
 const prices=enriched.map(l=>Number(l.gross_unit_price||0)).filter(x=>x>=0);
 const last=enriched[enriched.length-1];
 return {last:Number(last.gross_unit_price||0),avg:totalQty?totalVal/totalQty:0,min:Math.min(...prices),max:Math.max(...prices),lastDate:last.inv?.invoice_date||null};
}
function warehouseValue(){
 const stocks=stockMap();return APP.products.reduce((s,p)=>s+Math.max(0,stocks[p.id]||0)*purchaseStats(p.id).avg,0);
}
function eventCost(id){return APP.consumption_lines.filter(x=>Number(x.event_id)===Number(id)).reduce((s,x)=>s+Number(x.cost_total||0),0)}
function eventQty(id){return APP.consumption_lines.filter(x=>Number(x.event_id)===Number(id)).reduce((s,x)=>s+Number(x.quantity_base||0),0)}
function stockDisplay(p,q){
 const per=Number(p.units_per_case||1);
 if(per>1&&['bottiglia','pezzo'].includes(String(p.base_unit).toLowerCase())){
  const cases=Math.floor((q+1e-9)/per),rest=Math.round((q-cases*per)*100)/100;
  if(cases>0)return `${num(q,q%1?2:0)} ${p.base_unit}${q===1?'':'e'} · ${cases} ${cases===1?'cassa':'casse'}${rest?` + ${num(rest,rest%1?2:0)}`:''}`;
 }
 return `${num(q,q%1?2:0)} ${p.base_unit}${q===1?'':'e'}`;
}
function movementLabel(t){
 return ({acquisto:'Acquisto',consumo:'Consumo',omaggio:'Omaggio','giacenza iniziale':'Giacenza iniziale','rettifica positiva':'Rettifica +','rettifica negativa':'Rettifica -',reso:'Reso',scarto:'Scarto'}[t]||t);
}
function statusFor(p,q){
 if(q<=0)return ['bad','Esaurito'];
 if(q<=Number(p.min_stock||0))return ['warn','Scorta bassa'];
 return ['ok','Disponibile'];
}
function pageHead(title,subtitle,actions=''){
 return `<div class="pagehead"><div><h1>${title}</h1><p>${subtitle}</p></div><div class="actions">${actions}</div></div>`;
}

 +`<div class="toolbar"><input class="search" id="invoiceSearch" placeholder="Cerca fornitore o numero fattura"><select class="field" id="invoiceSupplier"><option value="">Tutti i fornitori</option>${APP.suppliers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select><select class="field" id="invoiceType"><option value="">Tutti i documenti</option><option>XML</option><option>FOTO</option><option>PDF</option></select></div>
 <div class="card panel"><div id="invoiceTable"></div></div>`;
 const rerender=()=>{

  m.querySelector('#ocrInvoiceForm').onsubmit=async ev=>{ev.preventDefault();const fd=new FormData(ev.target),supplierName=String(fd.get('supplier')||'').trim(),number=String(fd.get('number')||'').trim(),date=fd.get('date'),total=Number(fd.get('total')||0);let sup=APP.suppliers.find(x=>norm(x.name)===norm(supplierName));if(!sup){sup={id:nextId(APP.suppliers),name:supplierName,vat_number:'',created_at:new Date().toISOString()};APP.suppliers.push(sup)}
   if(APP.invoices.some(x=>Number(x.supplier_id)===Number(sup.id)&&x.invoice_number===number&&x.invoice_date===date)&&!confirm('Possibile fattura duplicata. Vuoi registrarla comunque?'))return;
   const refs=[];for(const f of files)refs.push(await saveDocumentBlob(f));const iid=nextId(APP.invoices),source=files.every(f=>f.type==='application/pdf'||/\.pdf$/i.test(f.name))?'PDF':'FOTO';APP.invoices.push({id:iid,supplier_id:sup.id,invoice_number:number,invoice_date:date,total_gross:total,document_paths:JSON.stringify(refs),source_type:source,status:'confermato',notes:'Importata tramite OCR e confermata manualmente',created_at:new Date().toISOString()});
   let count=0;for(const row of box.querySelectorAll('.invoice-line-edit')){const desc=row.querySelector('.ocr-desc').value.trim(),qty=Number(row.querySelector('.ocr-qty').value),unit=row.querySelector('.ocr-unit').value,grossUnit=Number(row.querySelector('.ocr-price').value||0),vat=Number(row.querySelector('.ocr-vat').value||0),affects=row.querySelector('.ocr-stock').checked,isFree=row.querySelector('.ocr-free').checked;if(!desc||qty<=0)continue;let prod=null,qbase=0;if(affects){prod=findOrCreateProduct(desc,sup.id,unit);qbase=qty*(['CT','CF'].includes(unit)?Number(prod.units_per_case||1):1)}const lid=nextId(APP.invoice_lines),grossTotal=isFree?0:qty*grossUnit,baseGrossUnit=qbase&&grossTotal?qbase?grossTotal/qbase:0:0,netUnit=vat?baseGrossUnit/(1+vat/100):baseGrossUnit;APP.invoice_lines.push({id:lid,invoice_id:iid,product_id:prod?.id||null,raw_description:desc,source_quantity:qty,source_unit:unit,quantity_base:qbase,net_unit_price:netUnit,gross_unit_price:isFree?0:baseGrossUnit,net_total:vat?grossTotal/(1+vat/100):grossTotal,gross_total:grossTotal,vat_rate:vat,is_free:isFree?1:0,affects_stock:affects?1:0,notes:'OCR'});if(affects&&prod&&qbase)APP.movements.push({id:nextId(APP.movements),movement_date:date,movement_type:isFree?'omaggio':'acquisto',product_id:prod.id,quantity_delta:qbase,unit_cost:isFree?0:baseGrossUnit,source_type:'invoice_line',source_id:lid,area_id:null,user_id:null,notes:'Importazione foto/PDF',created_at:new Date().toISOString()});count++}
   if(!total){const inv=invoiceById(iid);inv.total_gross=APP.invoice_lines.filter(x=>Number(x.invoice_id)===iid).reduce((a,x)=>a+Number(x.gross_total||0),0)}await saveState();closeModal();renderAll();navigate('invoices');toast(`Fattura registrata: ${count} righe`);
  };
 });
}

async function handleBackupFile(e){
 const f=e.target.files[0];if(!f)return;
 try{const data=JSON.parse(await f.text());if(!data.products||!data.movements)throw new Error('Struttura non riconosciuta');if(!confirm('Sostituire tutti i dati presenti con questo backup?'))return;APP=data;await saveState();renderAll();toast('Backup ripristinato')}catch(ex){alert(`Impossibile importare il backup: ${ex.message}`)}
}
function download(name,content,type='application/octet-stream'){
 const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function exportBackup(){download(`TimeToParty_backup_${today()}.json`,JSON.stringify(APP,null,2),'application/json');toast('Backup esportato')}
function csvCell(v){const s=String(v??'');return /[;"\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s}
function exportWarehouseCSV(){
 const stocks=stockMap(),rows=[['Prodotto','Categoria','Formato','Giacenza','Unita','Costo medio IVA inclusa','Valore']];
 APP.products.forEach(p=>{const q=stocks[p.id]||0,c=purchaseStats(p.id).avg;rows.push([p.name,p.category,p.format,q,p.base_unit,c,Math.max(0,q)*c])});
 download(`Giacenza_magazzino_${today()}.csv`,rows.map(r=>r.map(csvCell).join(';')).join('\n'),'text/csv;charset=utf-8');toast('CSV esportato');
}
async function ensureXLSX(){
 if(window.XLSX)return true;
 return new Promise(resolve=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=()=>resolve(true);s.onerror=()=>resolve(false);document.head.appendChild(s)});
}
async function exportExcel(){
 if(!await ensureXLSX()){alert('Non riesco a caricare la libreria Excel. Esporta il backup JSON o il CSV.');return}
 const wb=XLSX.utils.book_new(),stocks=stockMap();
 const invoices=APP.invoices.map(i=>({Data:i.invoice_date,Fornitore:supplier(i.supplier_id)?.name,Numero:i.invoice_number,Totale:i.total_gross,Origine:i.source_type}));
 const ilines=APP.invoice_lines.map(l=>({Data:invoiceById(l.invoice_id)?.invoice_date,Fornitore:supplier(invoiceById(l.invoice_id)?.supplier_id)?.name,Fattura:invoiceById(l.invoice_id)?.invoice_number,Prodotto:product(l.product_id)?.name||l.raw_description,Descrizione:l.raw_description,Quantita:l.quantity_base,Unita:product(l.product_id)?.base_unit||l.source_unit,Prezzo_unitario_IVA_inclusa:l.gross_unit_price,Totale_IVA_inclusa:l.gross_total,IVA:l.vat_rate,Omaggio:l.is_free?'Sì':'No'}));
 const prod=APP.products.map(p=>{const ps=purchaseStats(p.id);return{Prodotto:p.name,Marca:p.brand,Categoria:p.category,Formato:p.format,Pezzi_per_cassa:p.units_per_case,Ultimo_prezzo:ps.last,Prezzo_medio:ps.avg,Prezzo_minimo:ps.min,Prezzo_massimo:ps.max,Data_ultimo_acquisto:ps.lastDate}});
 const cons=APP.consumption_lines.map(x=>({Data:eventById(x.event_id)?.event_date,Evento:eventById(x.event_id)?.name,Area:area(x.area_id)?.name,Prodotto:product(x.product_id)?.name,Quantita:x.quantity_base,Unita:x.unit,Costo_unitario:x.cost_unit,Costo_totale:x.cost_total,Note:x.notes}));
 const wh=APP.products.map(p=>{const q=stocks[p.id]||0,c=purchaseStats(p.id).avg;return{Prodotto:p.name,Categoria:p.category,Formato:p.format,Giacenza:q,Unita:p.base_unit,Casse_intere:p.units_per_case>1?Math.floor(q/p.units_per_case):'',Pezzi_residui:p.units_per_case>1?q%p.units_per_case:'',Costo_medio:c,Valore:Math.max(0,q)*c}});
 const mov=APP.movements.map(x=>({Data:x.movement_date,Tipo:movementLabel(x.movement_type),Prodotto:product(x.product_id)?.name,Quantita:x.quantity_delta,Costo_unitario:x.unit_cost,Area:area(x.area_id)?.name||'',Provenienza:x.source_type,Note:x.notes}));
 [['Ordini e fatture',invoices],['Dettaglio acquisti',ilines],['Listino prezzi',prod],['Consumi',cons],['Giacenza magazzino',wh],['Movimenti',mov]].forEach(([n,d])=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d),n.slice(0,31)));
 XLSX.writeFile(wb,`TimeToParty_Magazzino_${today()}.xlsx`);toast('Excel esportato');
}

 const el=document.getElementById('view-settings');

 +`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(290px,1fr))">
 <div class="card panel"><div class="sectiontitle"><h2>Dove vengono salvati i dati</h2></div><div class="notice">I dati sono salvati nel database del browser (IndexedDB) del dispositivo che stai usando. Non sono pubblicati nel repository GitHub.</div><p style="color:var(--muted);line-height:1.5">Se apri l’app da un altro telefono o computer, vedrai i dati iniziali ma non le modifiche fatte altrove. Per la sincronizzazione tra dispositivi servirà collegare un database cloud.</p></div>
 <div class="card panel"><div class="sectiontitle"><h2>Backup</h2></div><p style="color:var(--muted);line-height:1.5">Esporta un backup dopo ogni serata o nuovo caricamento importante.</p><div class="actions"><button class="btn" onclick="exportBackup()">Esporta backup</button><button class="btn secondary" onclick="navigate('import')">Ripristina backup</button></div></div>
 <div class="card panel"><div class="sectiontitle"><h2>Ripristino dati iniziali</h2></div><p style="color:var(--muted);line-height:1.5">Cancella le modifiche locali e ripristina le 13 fatture, le 7 serate e i movimenti caricati inizialmente.</p><button class="btn danger" onclick="resetSeed()">Ripristina dati iniziali</button></div>

async function resetSeed(){if(!confirm('Ripristinare i dati iniziali? Tutte le modifiche locali verranno perse.'))return;APP=clone(SEED_STATE);APP.meta={reset_at:new Date().toISOString(),version:1};await saveState();renderAll();toast('Dati iniziali ripristinati')}

init().catch(err=>{document.body.innerHTML=`<div style="padding:30px;font-family:sans-serif"><h1>Errore di avvio</h1><pre>${esc(err.stack||err.message)}</pre></div>`});
