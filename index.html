<!doctype html>
<html lang="it">
<head>

<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:#0e0e12;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input{font:inherit}.hidden{display:none!important}
#appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f5f5f7;visibility:hidden}
.authback{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:18px;background:linear-gradient(145deg,#17121f,#0e0e12);color:#fff}
.authcard{width:min(440px,100%);padding:25px;border-radius:26px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);box-shadow:0 28px 80px rgba(0,0,0,.45);backdrop-filter:blur(24px)}
.authbrand{display:flex;align-items:center;gap:13px;margin-bottom:22px}.logo{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:900;background:linear-gradient(145deg,#7c3aed,#a855f7);box-shadow:0 8px 22px rgba(124,58,237,.3)}
.authbrand h1{font-size:23px;margin:0}.authbrand p{margin:4px 0 0;color:rgba(255,255,255,.65);font-size:13px}.authcard label{display:grid;gap:6px;margin-top:12px;font-size:12px;font-weight:750;color:rgba(255,255,255,.72)}
.authcard input{width:100%;padding:13px 14px;border-radius:13px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;outline:none}.authcard input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.18)}
.actions{display:grid;gap:9px;margin-top:17px}.btn{width:100%;border:0;border-radius:13px;padding:12px 14px;font-weight:800;background:#7c3aed;color:#fff;cursor:pointer}.btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16)}
.msg{min-height:20px;margin-top:12px;font-size:12px;line-height:1.45;color:#f8c36a}.hint{font-size:11px;line-height:1.5;color:rgba(255,255,255,.5);margin-top:16px}.setup{line-height:1.55}.setup code{display:block;margin-top:12px;padding:11px;border-radius:12px;background:rgba(0,0,0,.28);overflow:auto;color:#eee}.loading{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.7);font-size:13px}.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.18);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<iframe id="appFrame" src="404.html?cloud=2.1.2" title="Time To Party Magazzino"></iframe>
<div class="authback" id="authBack">
 <div class="authcard">
  <div class="authbrand"><div class="logo">TTP</div><div><h1>Time To Party</h1><p>Magazzino condiviso</p></div></div>
  <form id="authForm">
   <label>Email<input id="email" type="email" autocomplete="email" required placeholder="nome@email.it"></label>
   <label>Password<input id="password" type="password" autocomplete="current-password" minlength="6" required placeholder="Almeno 6 caratteri"></label>
   <div class="actions"><button class="btn">Accedi</button><button class="btn secondary" type="button" id="signupBtn">Crea il primo account</button></div>
   <div class="msg" id="msg"></div>
  </form>
  <div class="loading hidden" id="loading"><span class="spinner"></span><span>Caricamento del magazzino condiviso…</span></div>
  <div class="hint">Dopo aver creato il primo account, disattiva le nuove registrazioni nelle impostazioni Auth di Supabase. Non inserire mai nell’app una secret key o la service_role.</div>
 </div>
</div>
<script>
const SUPABASE_URL='https://sqiectsrmihgvgxkgale.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_ynDp6ueD6HSRRhq8xJFmOA_kHDgCEri';
const STATE_ID='main',POLL_MS=12000;
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
const frame=document.getElementById('appFrame'),authBack=document.getElementById('authBack'),authForm=document.getElementById('authForm'),msg=document.getElementById('msg'),loading=document.getElementById('loading');
let app=null,session=null,cloudVersion=0,cloudUpdatedAt=null,saving=false,pollTimer=null,originalLocalSave=null,originalOpenDocument=null;
function cloneState(value){return typeof structuredClone==='function'?structuredClone(value):JSON.parse(JSON.stringify(value))}
function cloudError(error){const code=String(error?.code||''),text=String(error?.message||error||'Errore cloud');if(code==='PGRST205'||code==='42P01'||/app_state|schema cache|does not exist/i.test(text))return 'SETUP_REQUIRED';return text}
function setMessage(text){msg.textContent=text||''}
function showLoading(show=true){authForm.classList.toggle('hidden',show);loading.classList.toggle('hidden',!show)}
function getAppState(){return app?.__TTP_APP__||null}
function setAppState(value){if(app)app.__TTP_APP__=value}
function exposeAppState(w){try{w.eval("if(!Object.getOwnPropertyDescriptor(window,'__TTP_APP__')){Object.defineProperty(window,'__TTP_APP__',{configurable:true,get:function(){return APP},set:function(value){APP=value}})}");return w.__TTP_APP__||null}catch(error){return null}}
function setFrameStatus(text,kind=''){if(!app)return;const t=app.document.getElementById('syncText');if(t)t.textContent=text;const notice=app.document.getElementById('sideCloudNotice')||app.document.querySelector('.sidefoot .notice');if(notice)notice.textContent=`Cloud Supabase · ${text}`;t?.style?.setProperty('color',kind==='bad'?'#c52929':kind==='ok'?'#14804a':'')}
async function waitForApp(){for(let i=0;i<300;i++){try{const w=frame.contentWindow;if(w&&w.renderAll&&w.saveState&&w.loadState&&exposeAppState(w))return w}catch(error){}await new Promise(resolve=>setTimeout(resolve,100))}throw new Error('L’interfaccia del gestionale non si è caricata correttamente. Aggiorna la pagina e riprova.')}
async function loadWarehouseExtension(w){if(w.__TTP_WAREHOUSE_EXT_READY)return;await new Promise((resolve,reject)=>{const existing=w.document.getElementById('ttpWarehouseExtensionScript');if(existing){existing.addEventListener('load',resolve,{once:true});existing.addEventListener('error',()=>reject(new Error('Modulo Incassi e Carico/Reso non caricato.')),{once:true});return}const script=w.document.createElement('script');script.id='ttpWarehouseExtensionScript';script.src='warehouse_extensions.js?v=2.1.2';script.onload=resolve;script.onerror=()=>reject(new Error('Modulo Incassi e Carico/Reso non caricato.'));w.document.body.appendChild(script)});for(let i=0;i<100;i++){if(w.__TTP_WAREHOUSE_EXT_READY)return;if(w.__TTP_WAREHOUSE_EXT_ERROR)throw new Error(w.__TTP_WAREHOUSE_EXT_ERROR);await new Promise(resolve=>setTimeout(resolve,50))}throw new Error('Il modulo Incassi e Carico/Reso non si è inizializzato correttamente.')}
async function fetchState(){const {data,error}=await sb.from('app_state').select('id,data,version,updated_at,updated_by').eq('id',STATE_ID).maybeSingle();if(error)throw error;return data||null}
async function insertState(state){const payload=cloneState(state);payload.meta=payload.meta||{};payload.meta.pending_cloud=false;payload.meta.synced_at=new Date().toISOString();const {data,error}=await sb.from('app_state').insert({id:STATE_ID,data:payload,version:1,updated_by:session.user.id}).select('data,version,updated_at').single();if(error){if(error.code==='23505')return fetchState();throw error}return data}
async function cacheCurrent(){if(originalLocalSave)await originalLocalSave()}
async function pushState(forceVersion=null){const currentState=getAppState();if(!currentState)throw new Error('Stato del gestionale non disponibile.');const expected=forceVersion??cloudVersion,next=Number(expected)+1,payload=cloneState(currentState);payload.meta=payload.meta||{};payload.meta.pending_cloud=false;payload.meta.synced_at=new Date().toISOString();const {data,error}=await sb.from('app_state').update({data:payload,version:next,updated_at:new Date().toISOString(),updated_by:session.user.id}).eq('id',STATE_ID).eq('version',expected).select('data,version,updated_at').maybeSingle();if(error)throw error;if(!data){const current=await fetchState();if(!current)throw new Error('Stato cloud non disponibile.');const overwrite=confirm('Il magazzino è stato modificato da un altro dispositivo. Premi OK per mantenere le modifiche di questo dispositivo, oppure Annulla per caricare la versione più recente dal cloud.');if(!overwrite){setAppState(current.data);cloudVersion=current.version;cloudUpdatedAt=current.updated_at;await cacheCurrent();app.renderAll();setFrameStatus('Aggiornato dal cloud','ok');return null}return pushState(current.version)}setAppState(data.data);cloudVersion=data.version;cloudUpdatedAt=data.updated_at;await cacheCurrent();return data}
async function cloudSave(){const state=getAppState();if(!state)return false;state.meta=state.meta||{};state.meta.updated_at=new Date().toISOString();state.meta.pending_cloud=true;await cacheCurrent();if(!navigator.onLine){setFrameStatus('Offline · modifiche in attesa','bad');return false}saving=true;setFrameStatus('Sincronizzazione…');try{await pushState();setFrameStatus('Sincronizzato','ok');return true}catch(error){const latest=getAppState();if(latest){latest.meta=latest.meta||{};latest.meta.pending_cloud=true}await cacheCurrent();setFrameStatus('Modifiche da sincronizzare','bad');app.toast?.(`Salvato sul dispositivo: ${cloudError(error)}`);return false}finally{saving=false}}
async function pullState(showToast=false){if(!session||saving||!navigator.onLine)return;try{const row=await fetchState();if(!row)return;const state=getAppState();if(Number(row.version)>Number(cloudVersion)){if(state?.meta?.pending_cloud){if(showToast)app.toast?.('Prima sincronizza le modifiche locali.');return}setAppState(row.data);cloudVersion=row.version;cloudUpdatedAt=row.updated_at;await cacheCurrent();app.renderAll();patchCloudUI();setFrameStatus('Aggiornato ora','ok');if(showToast)app.toast?.('Dati aggiornati dal cloud')}else if(state?.meta?.pending_cloud)await cloudSave();else setFrameStatus('Sincronizzato','ok')}catch(error){setFrameStatus('Cloud non raggiungibile','bad');if(showToast)app.toast?.(cloudError(error))}}
function safeName(name){return String(name||'documento').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]+/g,'_').slice(-110)}
async function cloudUpload(file){if(!navigator.onLine)throw new Error('Per caricare foto o PDF nel cloud serve una connessione internet.');const path=`${session.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}_${safeName(file.name)}`;const {data,error}=await sb.storage.from('documents').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});if(error)throw new Error(`Caricamento documento non riuscito: ${error.message}`);return{storage:'supabase',id:`cloud:${data.path}`,name:file.name||'documento',mime:file.type||''}}
async function cloudOpenDocument(id){if(String(id).startsWith('cloud:')){const path=String(id).slice(6),{data,error}=await sb.storage.from('documents').createSignedUrl(path,300);if(error){alert(`Documento non disponibile: ${error.message}`);return}window.open(data.signedUrl,'_blank','noopener');return}return originalOpenDocument(id)}
function patchCloudUI(){if(!app)return;app.saveState=cloudSave;app.saveDocumentBlob=cloudUpload;app.openStoredDocument=cloudOpenDocument;app.renderSettings=function(){const el=app.document.getElementById('view-settings'),email=session?.user?.email||'—';el.innerHTML=app.pageHead('Impostazioni','Account, sincronizzazione e backup del gestionale')+`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(290px,1fr))"><div class="card panel"><div class="sectiontitle"><h2>Database condiviso</h2><span class="badge ok">Attivo</span></div><div class="notice">Ogni modifica viene salvata su Supabase e resa disponibile su tutti i dispositivi autorizzati.</div><p style="color:var(--muted);line-height:1.5"><b>Account:</b> ${app.esc(email)}<br><b>Versione cloud:</b> ${cloudVersion||'—'}<br><b>Ultimo aggiornamento:</b> ${cloudUpdatedAt?new Date(cloudUpdatedAt).toLocaleString('it-IT'):'—'}</p><div class="actions"><button class="btn" onclick="parent.ttpSyncNow()">Sincronizza ora</button><button class="btn secondary" onclick="parent.ttpSignOut()">Esci</button></div></div><div class="card panel"><div class="sectiontitle"><h2>Backup</h2></div><p style="color:var(--muted);line-height:1.5">Il cloud è il salvataggio principale. Il backup JSON resta una copia aggiuntiva.</p><div class="actions"><button class="btn" onclick="exportBackup()">Esporta backup</button><button class="btn secondary" onclick="navigate('import')">Importa backup</button></div></div><div class="card panel"><div class="sectiontitle"><h2>Ripristino dati iniziali</h2></div><p style="color:var(--muted);line-height:1.5">Ripristina anche la versione condivisa nel cloud.</p><button class="btn danger" onclick="resetSeed()">Ripristina dati iniziali</button></div><div class="card panel"><div class="sectiontitle"><h2>Versione cloud</h2><span>2.1.2</span></div><ul style="color:var(--muted);line-height:1.7;padding-left:20px"><li>Sincronizzazione multi-dispositivo</li><li>Incassi per serata e area</li><li>Consumi automatici da carico e rimanenza</li><li>Nuovi documenti in Supabase Storage</li><li>Controllo dei conflitti</li></ul></div></div>`};const currentRenderAll=app.renderAll;if(!currentRenderAll.__cloudWrapped){const wrapped=function(){currentRenderAll();setTimeout(patchCloudUI,0)};wrapped.__cloudWrapped=true;app.renderAll=wrapped}setFrameStatus('Sincronizzato','ok')}
function nextNumericId(list){return Array.isArray(list)&&list.length?Math.max(...list.map(x=>Number(x.id)||0))+1:1}
function findProductByName(state,name){return (state.products||[]).find(p=>String(p.name||'')===name)||null}
function findAreaByName(state,name){return (state.areas||[]).find(a=>String(a.name||'').toLowerCase()===String(name).toLowerCase())||null}
function avgCost(productId){try{return Number(app?.purchaseStats?.(productId)?.avg||0)}catch(error){return 0}}
function addMovementOnce(state,{code,date,type,productId,delta,sourceType,note,areaId=null,sourceId=null}){if(state.movements.some(m=>String(m.notes||'').includes(code)))return false;state.movements.push({id:nextNumericId(state.movements),movement_date:date,movement_type:type,product_id:productId,quantity_delta:delta,unit_cost:avgCost(productId),source_type:sourceType,source_id:sourceId,area_id:areaId,user_id:session?.user?.id||null,notes:`${note} ${code}`,created_at:new Date().toISOString()});return true}
function applyInventoryReconciliation(state){const marker='inventory_reconciliation_20260718_v1';if(state.meta[marker]){state.movements.forEach(m=>{if(Number(m.quantity_delta)<0&&String(m.notes||'').includes('[INV-20260718:')){m.movement_date='2026-07-24';m.notes=String(m.notes).replace('18/07/2026','24/07/2026')}});state.meta[marker].inventory_date='2026-07-24';return false}let campari=findProductByName(state,'Campari 1 L');if(!campari){campari={id:nextNumericId(state.products),name:'Campari 1 L',brand:'Campari',category:'Aperitivi',subcategory:'',format:'1 L',base_unit:'bottiglia',units_per_case:6,min_stock:2,active:1,created_at:new Date().toISOString()};state.products.push(campari)}const opening=[['Gin Tanqueray 1 L',12],['Aperol 1 L',2],['Vodka fragola 1 L',2],['Campari 1 L',15],['Rum scuro',5],['Vodka Smirnoff Red 1 L',7],['Rum bianco 1 L',3],['Triple Sec 1 L',2],['Prosecco Serena',22],['Grey Goose 70 cl',2],['Cannucce 7×21 – confezione 1.000',2]],negative=[['Bitter Martini 1 L',-1],['Vermouth rosso 1 L',-7],['Gin Tanqueray Ten 70 cl',-1],['Moët Réserve Impériale',-1]];opening.forEach(([name,qty])=>{const p=findProductByName(state,name);if(p)addMovementOnce(state,{code:`[INV-20260718:${p.id}:${qty}]`,date:'2026-06-05',type:'giacenza iniziale',productId:p.id,delta:qty,sourceType:'opening_balance',note:'Merce già presente a inizio stagione, ricostruita tramite inventario fisico.'})});negative.forEach(([name,qty])=>{const p=findProductByName(state,name);if(p)addMovementOnce(state,{code:`[INV-20260718:${p.id}:${qty}]`,date:'2026-07-24',type:'rettifica negativa',productId:p.id,delta:qty,sourceType:'adjustment',note:'Rettifica negativa da inventario fisico del 24/07/2026.'})});state.audit_logs.push({id:nextNumericId(state.audit_logs),action:'riconciliazione inventario',entity_type:'warehouse',entity_id:null,details:'Inventario fisico 24/07/2026: giacenze iniziali e rettifiche negative applicate',created_at:new Date().toISOString()});state.meta[marker]={applied_at:new Date().toISOString(),opening_units:74,negative_units:10,inventory_date:'2026-07-24'};return true}
function applyPrideConsumption(state){const marker='pride_consumption_20260718_v1';if(state.meta[marker])return false;let event=(state.events||[]).find(e=>String(e.name||'').trim().toLowerCase()==='pride');if(!event){event={id:nextNumericId(state.events),event_date:'2026-07-18',name:'Pride',location:'Da definire',notes:'Consumi caricati da riepilogo manuale',created_at:new Date().toISOString()};state.events.push(event)}const general=findAreaByName(state,'Generale')||(state.areas||[])[0],entries=[['Lemon',6],['Tonica',13],['Coca-Cola',3],['Bicchieri 355 cc – stecca da 30',12],['Bicchieri 250 cc – stecca da 50',4],['Gin Tanqueray 1 L',11],['Vermouth rosso 1 L',2],['Prosecco Serena',3],['Vodka Smirnoff Red 1 L',2],['Bitter Martini 1 L',1],['Aperol 1 L',1]];for(const [name,qty] of entries){const p=findProductByName(state,name);if(!p)continue;const lineCode=`PRIDE-20260718-${p.id}`;if(!state.consumption_lines.some(x=>String(x.notes||'').includes(lineCode))){const cid=nextNumericId(state.consumption_lines),cost=avgCost(p.id);state.consumption_lines.push({id:cid,event_id:event.id,area_id:general?.id||null,product_id:p.id,quantity_base:qty,unit:p.base_unit,cost_unit:cost,cost_total:qty*cost,notes:`Consumo Pride · ${lineCode}`,source_type:'manual_import',source_id:null,created_at:new Date().toISOString()});addMovementOnce(state,{code:`[${lineCode}]`,date:event.event_date,type:'consumo',productId:p.id,delta:-qty,sourceType:'consumption_line',sourceId:cid,areaId:general?.id||null,note:'Consumo Pride caricato da riepilogo manuale.'})}addMovementOnce(state,{code:`[PRIDE-OFFSET-20260718:${p.id}]`,date:'2026-06-05',type:'giacenza iniziale',productId:p.id,delta:qty,sourceType:'opening_balance',note:'Adeguamento giacenza iniziale per consumo storico Pride già incluso nell’inventario fisico attuale.'})}state.audit_logs.push({id:nextNumericId(state.audit_logs),action:'caricamento consumo Pride',entity_type:'event',entity_id:event.id,details:'11 righe di consumo, 58 unità complessive; giacenza iniziale compensata per mantenere invariato l’inventario fisico del 24/07/2026',created_at:new Date().toISOString()});state.meta[marker]={applied_at:new Date().toISOString(),event_id:event.id,event_date:event.event_date,total_units:58,area_id:general?.id||null,opening_offset:true};return true}
async function applyPendingMigrations(){const state=getAppState();if(!state)return false;state.meta=state.meta||{};state.products=Array.isArray(state.products)?state.products:[];state.events=Array.isArray(state.events)?state.events:[];state.areas=Array.isArray(state.areas)?state.areas:[];state.movements=Array.isArray(state.movements)?state.movements:[];state.consumption_lines=Array.isArray(state.consumption_lines)?state.consumption_lines:[];state.audit_logs=Array.isArray(state.audit_logs)?state.audit_logs:[];const a=applyInventoryReconciliation(state),b=applyPrideConsumption(state);if(a||b){await cloudSave();return true}return false}
async function startApp(activeSession){session=activeSession;showLoading(true);setMessage('');try{app=await waitForApp();await loadWarehouseExtension(app);originalLocalSave=app.saveState.bind(app);originalOpenDocument=app.openStoredDocument.bind(app);let row=await fetchState();if(!row)row=await insertState(getAppState());setAppState(row.data);cloudVersion=row.version;cloudUpdatedAt=row.updated_at;await cacheCurrent();patchCloudUI();const migrated=await applyPendingMigrations();app.renderAll();if(migrated)app.toast?.('Consumo Pride e inventario sincronizzati');frame.style.visibility='visible';authBack.classList.add('hidden');if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>pullState(false),POLL_MS);window.addEventListener('focus',()=>pullState(false));document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')pullState(false)})}catch(error){showLoading(false);const text=cloudError(error);if(text==='SETUP_REQUIRED'){authForm.classList.add('hidden');setMessage('');loading.classList.add('hidden');const box=authBack.querySelector('.authcard');if(!box.querySelector('.setup'))box.insertAdjacentHTML('beforeend','<div class="setup"><b>Database non ancora configurato.</b><p>Apri Supabase → SQL Editor, esegui il file <code>supabase_setup.sql</code> presente nel repository e poi ricarica questa pagina.</p></div>')}else setMessage(text)}}
window.ttpSyncNow=()=>pullState(true);
window.ttpSignOut=async()=>{if(getAppState()?.meta?.pending_cloud)await cloudSave();await sb.auth.signOut();location.reload()};
authForm.onsubmit=async event=>{event.preventDefault();setMessage('Accesso in corso…');const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value,{data,error}=await sb.auth.signInWithPassword({email,password});if(error){setMessage(error.message);return}await startApp(data.session)};
document.getElementById('signupBtn').onclick=async()=>{const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;if(!email||password.length<6){setMessage('Inserisci email e una password di almeno 6 caratteri.');return}setMessage('Creazione account…');const {data,error}=await sb.auth.signUp({email,password,options:{emailRedirectTo:'https://abelaanto-commits.github.io/magazzino/'}});if(error){setMessage(error.message);return}if(data.session)await startApp(data.session);else setMessage('Account creato. Controlla l’email di conferma, poi accedi.')};
(async()=>{const {data,error}=await sb.auth.getSession();if(error){setMessage(error.message);return}if(data.session)await startApp(data.session)})();
</script>
